name: Update daily news

on:
  schedule:
    # 22:15 UTC = 06:15 Singapore time, every day
    - cron: "15 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check API key is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not set — skipping news generation. Add it in Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.skip != 'true'

      - uses: actions/setup-node@v4
        if: env.skip != 'true'
        with:
          node-version: 22

      - name: Install dependencies
        if: env.skip != 'true'
        run: npm install --no-audit --no-fund

      - name: Generate today's news
        if: env.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-news.mjs

      - name: Commit and push if changed
        if: env.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update news for $(TZ=Asia/Singapore date +%F)"
            git push
          fi
